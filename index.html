        saveCurrentToHistory(data.topic);
      } catch(e) { addMessage('ai', '更新失败，请重试。', true); }
    }

}

// ==================== 文章解析模式 ====================
async function processArticleInput(text) {
  if (/^https?:\/\//.test(text)) {
    addMessage('ai', '⚠️ 目前无法直接访问链接，请复制文章正文后粘贴给我。公众号文章可以用「阅读原文」复制全文。');
    return;
  }
  const sp = '你是资深分析师，擅长从文章中提炼核心论点和逻辑链条。\n\n格式：{"topic":"文章核心论点","children":[{"topic":"分论点/论据维度","children":[{"topic":"关键推论/洞察"}]}]}\n\n严格规则：\n1. 只保留 3-5 个一级分支，每个 1-2 个子节点\n2. 每个节点必须是「论点」「判断」「逻辑推理」或「核心洞察」\n3. 不要照搬原文句子，用自己的话提炼观点（如「数据驱动决策是增长的关键杠杆」而非「文中提到通过数据分析发现增长点」）\n4. 把具体案例和数据抽象为判断句，不要直接罗列\n5. 一级分支加 emoji 前缀\n6. 最多 3 层，不要更深\n7. 只输出 JSON';
  const result = await callAI(sp, '文章内容：\n\n' + text);
  if (result) {
    try {
      const data = JSON.parse(result.match(/\{[\s\S]*\}/)[0]);
      renderMindmap(data); addMessage('ai', '✅ 文章解析完成，继续粘贴更多内容会自动关联。');
      saveCurrentToHistory(data.topic);
    } catch(e) { addMessage('ai', '文章解析失败，请检查内容是否完整。', true); }
  }
}

// ==================== 思维碰撞 ====================
async function triggerBrainstorm(context) {
  const sp = '请基于以下内容提供 3-5 个思维方向或灵感火花，每个用 1-2 句描述。\n输出 JSON 数组：["方向1：描述", "方向2：描述"]\n只输出数组。';
  const result = await callAI(sp, context, 0.9);
  if (result) {
    try {
      const ideas = JSON.parse(result.match(/\[[\s\S]*\]/)[0]);
      const list = document.getElementById('sparkList');
      list.innerHTML = '';
      ideas.forEach(idea => {
        const item = document.createElement('div');
        item.className = 'spark-item'; item.textContent = idea;
        item.onclick = () => { document.getElementById('userInput').value = idea; showToast('已填入输入框'); };
        list.appendChild(item);
      });
    } catch(e) {}
  }
}

// ==================== 导图渲染（核心改进）====================
let nodeIdCounter = 0;

function buildJsMindTree(node, branchIdx, level) {
  const id = 'n' + (nodeIdCounter++);
  level = level || 0;
  
  const result = { 
    id, 
    topic: node.topic || '未命名',
  };

  if (level === 0) {
    // 根节点不加额外 class
  } else {
    // 添加层级和分支 CSS class
    const classes = ['level-' + Math.min(level, 5)];
    if (level === 5) classes.push('level-deep');
    if (branchIdx !== undefined) {
      classes.push('branch-' + (branchIdx % 8));
    }
    result['class'] = classes.join(' ');
  }

  if (node.children && node.children.length > 0) {
    result.children = node.children.map((c, i) => buildJsMindTree(c, level === 0 ? i : branchIdx, level + 1));
  }
  return result;
}

function renderMindmap(data) {
  const container = document.getElementById('jsmind_container');
  document.getElementById('placeholder').style.display = 'none';
  document.getElementById('zoomControls').style.display = 'flex';
  State.mindmapData = data;
  State.dragOffsetX = 0;
  State.dragOffsetY = 0;

  if (State.jm) { try { State.jm = null; } catch(e) {} container.innerHTML = ''; }

  nodeIdCounter = 0;
  const mindData = {
    meta: { name: 'mindflow', author: 'user', version: '0.3' },
    format: 'node_tree',
    data: buildJsMindTree(data)
  };

  State.jm = new jsMind({
    container: 'jsmind_container',
    editable: true,
    theme: 'primary',
    view: { 
      engine: 'canvas', 
      hmargin: 120,   // 增大水平边距 - 呼吸感
      vmargin: 60,    // 增大垂直边距
      line_width: 2,  // 连线加粗
      line_color: 'rgba(255,255,255,0.06)',
    },
    layout: { 
      hspace: 40,     // 水平间距加大 - 呼吸感
      vspace: 24,     // 垂直间距加大
      pspace: 16,     // 父子节点间距加大
      direction: State.layoutDirection || 'right', // 布局方向：right=横向，bottom=纵向
    },
  });
  State.jm.show(mindData);
  State.zoomScale = 1.0;
  document.getElementById('zoomLevel').textContent = '100%';

  // 渲染后给节点应用分支颜色的连线
  setTimeout(() => applyBranchLineColors(), 100);

  State.jm.add_event_listener(function(type, node) {
    if (type === 'edit_end') {
      // 用户手动编辑后同步数据
    }
  });

  // 更新返回按钮
  updateBackButton();
}

// 给不同分支的连线着色（通过 canvas 绘制后处理）
function applyBranchLineColors() {
  try {
    const container = document.getElementById('jsmind_container');
    const nodes = container.querySelectorAll('jmnode');
    nodes.forEach(node => {
      // 节点 hover 效果增强
      node.style.cursor = 'pointer';
    });

    // 给一级节点的连线区域添加颜色标识
    const level1Nodes = container.querySelectorAll('jmnode.branch-0.level-1, jmnode.branch-1.level-1, jmnode.branch-2.level-1, jmnode.branch-3.level-1, jmnode.branch-4.level-1, jmnode.branch-5.level-1, jmnode.branch-6.level-1, jmnode.branch-7.level-1');
    level1Nodes.forEach(node => {
      // 已经通过 CSS 实现了边框颜色
      node.style.transition = 'all 0.15s ease';
    });
  } catch(e) {}
}

// ==================== 清空 ====================
function clearAll() {
  if (!confirm('清空当前内容？历史记录不会删除，可以随时恢复。')) return;
  goBack();
}

function goBack() {
  // 返回并显示空状态
  State.mindmapData = null; State.chatHistory = []; State.transcript = '';
  State.dragOffsetX = 0; State.dragOffsetY = 0;
  document.getElementById('chatMessages').innerHTML = '';
  document.getElementById('jsmind_container').innerHTML = '';
  document.getElementById('placeholder').style.display = '';
  document.getElementById('sparkList').innerHTML = '';
  document.getElementById('zoomControls').style.display = 'none';
  State.zoomScale = 1.0;
  // 隐藏返回按钮
  document.getElementById('backBtn').style.display = 'none';
  showToast('已返回');
}

// 更新返回按钮显示状态
function updateBackButton() {
  const backBtn = document.getElementById('backBtn');
  if (State.mindmapData) {
    backBtn.style.display = 'flex';
  } else {
    backBtn.style.display = 'none';
  }
}

// ==================== Toast ====================
function showToast(msg, type) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = 'toast' + (type === 'error' ? ' toast-error' : type === 'success' ? ' toast-success' : '');
  toast.classList.add('show');
  clearTimeout(toast._timer);
  toast._timer = setTimeout(() => toast.classList.remove('show'), 2800);
}

// ==================== 启动 ====================
init();
